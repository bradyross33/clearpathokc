<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Leadership Institute · Clear Path Leadership">
<meta property="og:description" content="Members-only access to the Clear Path Leadership Institute.">
<meta property="og:image" content="https://clearpathokc.com/social-preview.jpg">
<meta property="og:url" content="https://clearpathokc.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Leadership Institute · Clear Path Leadership">
<meta name="twitter:description" content="Members-only access to the Clear Path Leadership Institute.">
<meta name="twitter:image" content="https://clearpathokc.com/social-preview.jpg">
<title>Leadership Institute · Clear Path Leadership</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .lock-icon {
    margin-bottom: 32px;
    opacity: 0.4;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #00BDFF;
    margin-bottom: 16px;
    text-align: center;
  }

  h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #fff;
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.1;
  }

  .sub {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    text-align: center;
    margin-bottom: 48px;
    max-width: 360px;
    line-height: 1.7;
  }

  .password-form {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .password-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 14px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }

  .password-input::placeholder {
    color: rgba(255,255,255,0.3);
  }

  .password-input:focus {
    border-color: #00BDFF;
  }

  .btn-enter {
    width: 100%;
    background: #00BDFF;
    color: #000;
    border: none;
    padding: 14px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-enter:hover { opacity: 0.85; }

  .error-msg {
    font-size: 11px;
    color: #ff4444;
    text-align: center;
    font-weight: 600;
    letter-spacing: 0.05em;
    display: none;
  }

  .divider {
    width: 100%;
    max-width: 360px;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin: 32px 0;
  }

  .access-note {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    line-height: 1.7;
  }

  .access-note a {
    color: #00BDFF;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .access-note a:hover { opacity: 0.75; }

  .back-link {
    margin-top: 48px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-link:hover { color: #00BDFF; }
</style>
</head>
<body>

  <svg class="lock-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>

  <p class="eyebrow">Members Only</p>
  <h1>Leadership Institute</h1>

  <div class="password-form">
    <input
      type="password"
      class="password-input"
      id="passwordInput"
      placeholder="Enter password"
      onkeydown="if(event.key==='Enter') checkPassword()"
    />
    <button class="btn-enter" onclick="checkPassword()">Enter</button>
    <p class="error-msg" id="errorMsg">Incorrect password. Please try again.</p>
  </div>

  <hr class="divider">

  <p class="access-note">
    Don't have access yet?<br>
    <a href="mailto:info@clearpathokc.com?subject=Leadership%20Institute%20Access">Contact us to learn more.</a>
  </p>

  <a href="index.html" class="back-link">← Back to Home</a>

<script>
  function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    const error = document.getElementById('errorMsg');
    // Replace 'yourpassword' with your actual password before going live
    if (input === 'yourpassword') {
      window.location.href = 'institute-dashboard.html';
    } else {
      error.style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }
</script>

</body>
</html>
